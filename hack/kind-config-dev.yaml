kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraMounts:
    - hostPath: /home/${USER}
      containerPath: /home/${USER}
    - hostPath: /nix/var/nix/profiles/default
      containerPath: /nix/var/nix/profiles/default
    - hostPath: /home/${USER}/.nix-profile
      containerPath: /home/${USER}/.nix-profile
    - hostPath: /nix/store
      containerPath: /nix/store
