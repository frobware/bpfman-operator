apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemon
  namespace: kube-system
spec:
  template:
    spec:
      containers:
      - name: bpfman-supervisor
        volumeMounts:
        - name: home-aim--nix-profile
          mountPath: /home/aim/.nix-profile
          readOnly: true
        - name: home-aim
          mountPath: /home/aim
          readOnly: false
        - name: nix-store
          mountPath: /nix/store
          readOnly: true
        - name: nix-var-nix-profiles-default
          mountPath: /nix/var/nix/profiles/default
          readOnly: true
        - name: run-user-1000
          mountPath: /run/user/1000
          readOnly: false
      volumes:
      - name: home-aim--nix-profile
        hostPath:
          path: /home/aim/.nix-profile
          type: Directory
      - name: home-aim
        hostPath:
          path: /home/aim
          type: Directory
      - name: nix-store
        hostPath:
          path: /nix/store
          type: Directory
      - name: nix-var-nix-profiles-default
        hostPath:
          path: /nix/var/nix/profiles/default
          type: Directory
      - name: run-user-1000
        hostPath:
          path: /run/user/1000
          type: Directory
