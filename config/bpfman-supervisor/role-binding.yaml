kind: RoleBinding
metadata:
  name: env-helper-agent-rolebinding
  namespace: bpfman
subjects:
- kind: ServiceAccount
  name: bpfman-daemon
  namespace: bpfman
roleRef:
  kind: Role
  name: env-helper-agent-role
